name: FFmpeg DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout FFmpeg
      run: |
        git clone https://git.ffmpeg.org/ffmpeg.git --depth=1
        cd ffmpeg
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: |
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-make
          mingw-w64-ucrt-x86_64-nasm
          mingw-w64-ucrt-x86_64-libiconv
          mingw-w64-ucrt-x86_64-zlib
          make
    
    - name: Configure FFmpeg for Static Build
      shell: msys2 {0}
      run: |
        cd ffmpeg
        ./configure \
          --disable-shared \
          --enable-static \
          --enable-gpl \
          --enable-avcodec \
          --enable-avformat \
          --enable-avutil \
          --enable-swscale \
          --enable-decoder=h264,mpeg4,aac,mp3 \
          --enable-demuxer=mp4,mov,avi,mkv \
          --enable-protocol=file \
          --disable-programs \
          --disable-doc \
          --disable-network \
          --disable-bzlib \
          --disable-lzma \
          --disable-iconv \
          --disable-zlib \
          --extra-ldflags="-static-libgcc -static-libstdc++"
    
    - name: Build FFmpeg
      shell: msys2 {0}
      run: |
        cd ffmpeg
        make -j4
        
        # Verify static libraries were created
        echo "Static libraries created:"
        ls -la libavcodec/*.a | head -5
        ls -la libavformat/*.a | head -5
        ls -la libavutil/*.a | head -5
    
    - name: Create Single Combined DLL
      shell: msys2 {0}
      run: |
        cd ffmpeg
        
        # Create single DLL from static libraries
        gcc -shared -o ffmpeg_single.dll \
          -Wl,--whole-archive \
          libavcodec/libavcodec.a \
          libavformat/libavformat.a \
          libavutil/libavutil.a \
          libswscale/libswscale.a \
          -Wl,--no-whole-archive \
          -static-libgcc \
          -static-libstdc++ \
          -Wl,--export-all-symbols \
          -lwinmm \
          -lws2_32 \
          -lole32 \
          -lstrmiids \
          -luuid \
          -lbcrypt \
          -lsecur32 \
          -liconv \
          -lz
        
        # Strip to reduce size
        strip ffmpeg_single.dll
        
        echo "✅ Single DLL created successfully!"
        ls -lh ffmpeg_single.dll
        
        # Check if DLL works
        echo ""
        echo "Testing DLL..."
        file ffmpeg_single.dll
    
    - name: Upload Single DLL
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-single
        path: ffmpeg/ffmpeg_single.dll
