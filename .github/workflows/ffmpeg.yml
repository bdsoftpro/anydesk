name: FFmpeg DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout FFmpeg
      run: |
        git clone https://git.ffmpeg.org/ffmpeg.git --depth=1
        cd ffmpeg
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: |
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-make
          mingw-w64-ucrt-x86_64-nasm
          mingw-w64-ucrt-x86_64-libiconv
          mingw-w64-ucrt-x86_64-zlib
          make
    
    - name: Configure FFmpeg for Shared Build
      shell: msys2 {0}
      run: |
        cd ffmpeg
        ./configure \
          --enable-shared \
          --disable-static \
          --enable-gpl \
          --enable-avcodec \
          --enable-avformat \
          --enable-avutil \
          --enable-swscale \
          --disable-programs \
          --disable-doc \
          --disable-network \
          --disable-bzlib \
          --disable-lzma \
          --disable-iconv \
          --disable-zlib \
          --disable-everything \
          --enable-decoder=h264,mpeg4,aac,mp3 \
          --enable-demuxer=mp4,mov,avi,mkv \
          --enable-protocol=file \
          --extra-ldflags="-Wl,--output-def=ffmpeg.def"
    
    - name: Build
      shell: msys2 {0}
      run: |
        cd ffmpeg
        make -j4
    
    - name: Create DLL Package
      shell: msys2 {0}
      run: |
        cd ffmpeg
        
        # Copy DLLs to package folder
        mkdir -p dll_package
        
        # Copy FFmpeg DLLs
        cp libavcodec/*.dll dll_package/
        cp libavformat/*.dll dll_package/
        cp libavutil/*.dll dll_package/
        cp libswscale/*.dll dll_package/
        
        # Copy MinGW runtime DLLs
        cp /ucrt64/bin/libgcc_s_seh-1.dll dll_package/
        cp /ucrt64/bin/libstdc++-6.dll dll_package/
        cp /ucrt64/bin/libwinpthread-1.dll dll_package/
        cp /ucrt64/bin/libiconv-2.dll dll_package/
        cp /ucrt64/bin/zlib1.dll dll_package/
        
        # Create a single combined DLL
        echo "Creating combined DLL..."
        gcc -shared -o dll_package/ffmpeg_combined.dll \
          -Wl,--whole-archive \
          libavcodec/libavcodec.a \
          libavformat/libavformat.a \
          libavutil/libavutil.a \
          libswscale/libswscale.a \
          -Wl,--no-whole-archive \
          -Wl,--export-all-symbols \
          -lwinmm -lws2_32 -lole32 -lstrmiids -luuid -lbcrypt -lsecur32 -lz -liconv
        
        strip dll_package/ffmpeg_combined.dll
        
        echo "✅ Package created!"
        ls -lh dll_package/
    
    - name: Upload Package
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-shared-package
        path: ffmpeg/dll_package/
