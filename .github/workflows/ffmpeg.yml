name: FFmpeg DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Download FFmpeg Shared DLLs
      run: |
        # Download pre-built shared DLLs
        $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full-shared.7z"
        Invoke-WebRequest -Uri $url -OutFile ffmpeg.7z
        
        # Extract
        & "C:\Program Files\7-Zip\7z.exe" x ffmpeg.7z -oFFmpeg -y
        
        # Find bin folder
        $binPath = Get-ChildItem -Path FFmpeg -Directory -Filter "ffmpeg-*" | Select-Object -First 1
        $binPath = Join-Path $binPath.FullName "bin"
        
        # Copy all DLLs
        New-Item -ItemType Directory -Force -Path dlls
        Copy-Item "$binPath\*.dll" -Destination dlls\
        
        Write-Host "✅ DLLs copied"
    
    - name: Combine DLLs into Single DLL
      run: |
        # Install Microsoft Visual Studio build tools
        choco install visualstudio2022buildtools -y
        choco install windows-sdk-11 -y
        
        # Set up VS environment
        $vcVarsPath = "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
        
        # Create .def file for exports
        @"
        EXPORTS
        avcodec_version
        avformat_version
        avutil_version
        swscale_version
        avcodec_find_decoder
        avcodec_alloc_context3
        avcodec_open2
        avcodec_free_context
        av_packet_alloc
        av_packet_free
        av_packet_unref
        av_read_frame
        avformat_open_input
        avformat_find_stream_info
        avformat_close_input
        av_seek_frame
        av_new_packet
        av_init_packet
        "@ | Out-File -FilePath exports.def -Encoding ascii
        
        # Combine all DLLs using lib.exe
        & "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Tools\MSVC\14.40.33807\bin\Hostx64\x64\lib.exe" `
          /OUT:combined.lib `
          /MACHINE:X64 `
          dlls\avcodec-62.dll `
          dlls\avformat-62.dll `
          dlls\avutil-60.dll `
          dlls\swscale-8.dll
        
        # Create single DLL
        & "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Tools\MSVC\14.40.33807\bin\Hostx64\x64\link.exe" `
          /DLL `
          /OUT:ffmpeg.dll `
          /DEF:exports.def `
          /LIBPATH:"C:\Program Files (x86)\Windows Kits\10\Lib\10.0.22621.0\um\x64" `
          combined.lib `
          kernel32.lib user32.lib gdi32.lib winmm.lib ws2_32.lib ole32.lib
        
        Write-Host "✅ Single DLL created!"
        Get-Item ffmpeg.dll | Select-Object Name, Length
    
    - name: Upload Single DLL
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-single
        path: ffmpeg.dll
