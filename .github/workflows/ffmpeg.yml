name: FFmpeg DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout FFmpeg
      run: |
        git clone https://git.ffmpeg.org/ffmpeg.git --depth=1
        cd ffmpeg
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: |
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-make
          mingw-w64-ucrt-x86_64-nasm
          mingw-w64-ucrt-x86_64-diffutils
          mingw-w64-ucrt-x86_64-libiconv
          mingw-w64-ucrt-x86_64-zlib
          make
    
    - name: Configure FFmpeg (All static libs)
      shell: msys2 {0}
      run: |
        cd ffmpeg
        ./configure \
          --disable-shared \
          --enable-static \
          --enable-gpl \
          --enable-version3 \
          --enable-avcodec \
          --enable-avformat \
          --enable-avutil \
          --enable-swscale \
          --enable-swresample \
          --disable-programs \
          --disable-doc \
          --disable-network \
          --disable-bzlib \
          --disable-lzma \
          --disable-iconv \
          --disable-zlib \
          --disable-everything \
          --enable-decoder=h264,mpeg4,aac,mp3 \
          --enable-demuxer=mp4,mov,avi,mkv \
          --enable-protocol=file \
          --extra-ldflags="-static-libgcc -static-libstdc++"
    
    - name: Build
      shell: msys2 {0}
      run: |
        cd ffmpeg
        make -j4
        
        echo "✅ Build complete. Libraries:"
        ls -la libavcodec/*.a | wc -l
        ls -la libavformat/*.a | wc -l
        ls -la libavutil/*.a | wc -l
        ls -la libswresample/*.a | wc -l
    
    - name: Create Single DLL with all dependencies
      shell: msys2 {0}
      run: |
        cd ffmpeg
        
        # Create single DLL including swresample
        gcc -shared -o ffmpeg_single.dll \
          -Wl,--whole-archive \
          libavcodec/libavcodec.a \
          libavformat/libavformat.a \
          libavutil/libavutil.a \
          libswscale/libswscale.a \
          libswresample/libswresample.a \
          -Wl,--no-whole-archive \
          -static-libgcc \
          -static-libstdc++ \
          -Wl,--export-all-symbols \
          -lwinmm \
          -lws2_32 \
          -lole32 \
          -lstrmiids \
          -luuid \
          -lbcrypt \
          -lsecur32 \
          -liconv \
          -lz
        
        # Strip debug symbols
        strip ffmpeg_single.dll
        
        echo "✅ Single DLL created!"
        ls -lh ffmpeg_single.dll
        
        # Verify exports
        echo ""
        echo "Exported symbols:"
        nm -D ffmpeg_single.dll | grep " T " | head -10
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-complete-dll
        path: ffmpeg/ffmpeg_single.dll
