name: FFmpeg DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout FFmpeg
      run: |
        git clone https://git.ffmpeg.org/ffmpeg.git --depth=1
        cd ffmpeg
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: |
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-make
          mingw-w64-ucrt-x86_64-nasm
          mingw-w64-ucrt-x86_64-libiconv
          make
    
    - name: Configure Static FFmpeg
      shell: msys2 {0}
      run: |
        cd ffmpeg
        ./configure \
          --disable-shared \
          --enable-static \
          --enable-gpl \
          --enable-avcodec \
          --enable-avformat \
          --enable-avutil \
          --enable-swscale \
          --disable-programs \
          --disable-doc \
          --disable-network \
          --extra-ldflags="-static-libgcc -static-libstdc++"
    
    - name: Build
      shell: msys2 {0}
      run: |
        cd ffmpeg
        make -j4
    
    - name: Create Standalone DLL
      shell: msys2 {0}
      run: |
        cd ffmpeg
        
        # Create standalone DLL with static runtime
        gcc -shared -o ffmpeg.dll \
          -Wl,--whole-archive \
          libavcodec/libavcodec.a \
          libavformat/libavformat.a \
          libavutil/libavutil.a \
          libswscale/libswscale.a \
          -Wl,--no-whole-archive \
          -static-libgcc \
          -static-libstdc++ \
          -Wl,--export-all-symbols \
          -lwinmm -lws2_32 -lole32
        
        # Strip debug symbols to reduce size
        strip ffmpeg.dll
        
        echo "✅ Standalone ffmpeg.dll created (no external dependencies)"
        ls -lh ffmpeg.dll
        
        # Check dependencies
        echo ""
        echo "DLL Dependencies:"
        objdump -p ffmpeg.dll | grep "DLL Name" || true
    
    - name: Test DLL
      shell: msys2 {0}
      run: |
        cd ffmpeg
        
        # Create test program
        cat > test.c << 'EOF'
        #include <windows.h>
        #include <stdio.h>
        
        int main() {
            HMODULE dll = LoadLibrary("ffmpeg.dll");
            if (dll) {
                printf("✅ ffmpeg.dll loaded successfully!\n");
                FreeLibrary(dll);
                return 0;
            } else {
                printf("❌ Failed to load ffmpeg.dll\n");
                return 1;
            }
        }
        EOF
        
        gcc test.c -o test.exe
        ./test.exe
    
    - name: Upload Standalone DLL
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-standalone
        path: ffmpeg/ffmpeg.dll
