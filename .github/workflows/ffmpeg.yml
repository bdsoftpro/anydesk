name: FFmpeg DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout FFmpeg
      run: |
        git clone https://git.ffmpeg.org/ffmpeg.git
        cd ffmpeg
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: |
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-make
          mingw-w64-ucrt-x86_64-nasm
          mingw-w64-ucrt-x86_64-diffutils
          mingw-w64-ucrt-x86_64-pkg-config
          mingw-w64-ucrt-x86_64-libiconv
          make
    
    - name: Configure FFmpeg
      shell: msys2 {0}
      run: |
        cd ffmpeg
        ./configure \
          --disable-shared \
          --enable-static \
          --enable-gpl \
          --enable-version3 \
          --disable-all \
          --enable-avcodec \
          --enable-avformat \
          --enable-avutil \
          --enable-swscale \
          --enable-decoder=h264,mpeg4,vp9 \
          --enable-demuxer=mp4,mov,avi,webm \
          --extra-cflags="-Wno-array-bounds -Wno-unused-label -Wno-unused-function" \
          --disable-protocols \
          --disable-network
    
    - name: Build FFmpeg
      shell: msys2 {0}
      run: |
        cd ffmpeg
        make -j4 2>&1 | grep -v "warning:" || true
    
    - name: Create Single DLL
      shell: msys2 {0}
      run: |
        cd ffmpeg
        gcc -shared -o ffmpeg_single.dll \
          -Wl,--whole-archive \
          libavcodec/libavcodec.a \
          libavformat/libavformat.a \
          libavutil/libavutil.a \
          libswscale/libswscale.a \
          -Wl,--no-whole-archive \
          -liconv \
          -lws2_32 \
          -lwinmm \
          -lole32 \
          -lstrmiids \
          -luuid \
          -lz \
          -lbcrypt \
          -lsecur32 \
          -lcrypt32 \
          -lncrypt
    
    - name: Verify and Upload DLL
      shell: msys2 {0}
      run: |
        cd ffmpeg
        if [ -f ffmpeg_single.dll ]; then
          echo "✅ ffmpeg_single.dll created successfully!"
          ls -lh ffmpeg_single.dll
        else
          echo "❌ ffmpeg_single.dll not found!"
          exit 1
        fi
    
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg_single.dll
        path: ffmpeg/ffmpeg_single.dll
        if-no-files-found: error
