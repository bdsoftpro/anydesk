name: FFmpeg DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout FFmpeg
      run: |
        git clone https://git.ffmpeg.org/ffmpeg.git --depth=1
        cd ffmpeg
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: |
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-make
          mingw-w64-ucrt-x86_64-nasm
          mingw-w64-ucrt-x86_64-diffutils
          make
    
    - name: Configure FFmpeg (Shared Build - Better for Dart)
      shell: msys2 {0}
      run: |
        cd ffmpeg
        
        # Shared build - more compatible with Dart FFI
        ./configure \
          --enable-shared \
          --disable-static \
          --enable-gpl \
          --enable-avcodec \
          --enable-avformat \
          --enable-avutil \
          --enable-swscale \
          --enable-swresample \
          --disable-programs \
          --disable-doc \
          --disable-network \
          --disable-bzlib \
          --disable-lzma \
          --disable-iconv \
          --disable-zlib \
          --disable-everything \
          --enable-decoder=h264,mpeg4,aac,mp3 \
          --enable-demuxer=mp4,mov,avi,mkv \
          --enable-protocol=file
    
    - name: Build FFmpeg
      shell: msys2 {0}
      run: |
        cd ffmpeg
        make -j4
        echo "✅ Build complete"
    
    - name: Create DLL Package
      shell: msys2 {0}
      run: |
        cd ffmpeg
        
        # Create output directory
        mkdir -p dll_package
        
        # Copy all DLLs
        cp libavcodec/*.dll dll_package/ 2>/dev/null
        cp libavformat/*.dll dll_package/ 2>/dev/null
        cp libavutil/*.dll dll_package/ 2>/dev/null
        cp libswscale/*.dll dll_package/ 2>/dev/null
        cp libswresample/*.dll dll_package/ 2>/dev/null
        
        # Copy MinGW runtime DLLs (required)
        cp /ucrt64/bin/libgcc_s_seh-1.dll dll_package/ 2>/dev/null
        cp /ucrt64/bin/libstdc++-6.dll dll_package/ 2>/dev/null
        cp /ucrt64/bin/libwinpthread-1.dll dll_package/ 2>/dev/null
        
        echo "✅ DLL package created"
        ls -la dll_package/
    
    - name: Test DLLs
      shell: msys2 {0}
      run: |
        cd ffmpeg/dll_package
        
        # Create test program
        cat > test.c << 'EOF'
        #include <windows.h>
        #include <stdio.h>
        
        int main() {
            HMODULE avcodec = LoadLibrary("avcodec-62.dll");
            HMODULE avformat = LoadLibrary("avformat-62.dll");
            HMODULE avutil = LoadLibrary("avutil-60.dll");
            
            if (avcodec && avformat && avutil) {
                printf("✅ All DLLs loaded successfully!\n");
                FreeLibrary(avcodec);
                FreeLibrary(avformat);
                FreeLibrary(avutil);
                return 0;
            }
            
            printf("❌ Failed to load DLLs\n");
            return 1;
        }
        EOF
        
        gcc test.c -o test.exe
        ./test.exe
    
    - name: Upload DLLs
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-dlls
        path: ffmpeg/dll_package/
