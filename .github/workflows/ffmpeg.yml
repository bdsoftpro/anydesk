name: FFmpeg DLL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout FFmpeg
      run: |
        git clone https://git.ffmpeg.org/ffmpeg.git --depth=1
        cd ffmpeg
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: |
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-make
          mingw-w64-ucrt-x86_64-nasm
          mingw-w64-ucrt-x86_64-diffutils
          mingw-w64-ucrt-x86_64-pkg-config
          mingw-w64-ucrt-x86_64-libiconv
          mingw-w64-ucrt-x86_64-zlib
          make
          diffutils
    
    - name: Verify Tools
      shell: msys2 {0}
      run: |
        echo "Checking required tools..."
        which gcc
        which make
        which nasm
        which cmp
        which pkg-config
        echo "✅ All tools available"
    
    - name: Configure FFmpeg
      shell: msys2 {0}
      run: |
        cd ffmpeg
        ./configure \
          --disable-shared \
          --enable-static \
          --enable-gpl \
          --enable-avcodec \
          --enable-avformat \
          --enable-avutil \
          --enable-swscale \
          --enable-swresample \
          --disable-programs \
          --disable-doc \
          --disable-network \
          --disable-bzlib \
          --disable-lzma \
          --disable-iconv \
          --disable-zlib \
          --disable-everything \
          --enable-decoder=h264,mpeg4,aac,mp3 \
          --enable-demuxer=mp4,mov,avi,mkv \
          --enable-protocol=file \
          --extra-ldflags="-static-libgcc -static-libstdc++"
    
    - name: Build FFmpeg
      shell: msys2 {0}
      run: |
        cd ffmpeg
        make -j4
        
        echo "✅ Build complete"
        ls -la libavcodec/*.a | head -3
    
    - name: Create Single DLL
      shell: msys2 {0}
      run: |
        cd ffmpeg
        
        # Create single DLL
        gcc -shared -o ffmpeg_single.dll \
          -Wl,--whole-archive \
          libavcodec/libavcodec.a \
          libavformat/libavformat.a \
          libavutil/libavutil.a \
          libswscale/libswscale.a \
          libswresample/libswresample.a \
          -Wl,--no-whole-archive \
          -static-libgcc \
          -static-libstdc++ \
          -Wl,--export-all-symbols \
          -lwinmm -lws2_32 -lole32 -lstrmiids -luuid -lbcrypt -lsecur32
        
        # Strip debug symbols
        strip --strip-all ffmpeg_single.dll 2>/dev/null || true
        
        if [ -f ffmpeg_single.dll ]; then
          echo "✅ ffmpeg_single.dll created successfully!"
          ls -lh ffmpeg_single.dll
        else
          echo "❌ Failed to create DLL"
          exit 1
        fi
    
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-single-dll
        path: ffmpeg/ffmpeg_single.dll
