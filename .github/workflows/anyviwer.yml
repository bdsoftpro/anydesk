name: Windows RDP

on:
  workflow_dispatch:
    inputs:
      password:
        description: '🔑 RDP Password'
        required: true
        type: string
      session_minutes:
        description: '⏱️ How many minutes is the session? (max 55)'
        required: true
        default: '50'
        type: string

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: ${{ fromJSON(inputs.session_minutes) }}

    steps:
      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set RDP password
        shell: powershell
        run: |
          net user runneradmin "${{ inputs.password }}"

      - name: Download client
        shell: powershell
        run: |
          $headers = @{
            "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}"
            "Accept" = "application/vnd.github.v3.raw"
          }
          Invoke-WebRequest -Uri "https://api.github.com/repos/bdsoftpro/apk/contents/TunnelClient.exe" -Headers $headers -OutFile TunnelClient.exe
          Write-Host "✅ Download complete. Size: $((Get-Item TunnelClient.exe).Length) bytes"

      - name: Show RDP connection address
        shell: powershell
        run: |
          Start-Process .\TunnelClient.exe -WindowStyle Hidden
          Start-Sleep -Seconds 2

      - name: Keep session alive
        shell: powershell
        run: |
          $minutes = [int]"${{ inputs.session_minutes }}"
          $buffer = 2   # আগের setup স্টেপগুলোর জন্য রাখা সময়
          $sleepMinutes = $minutes - $buffer
          if ($sleepMinutes -lt 1) { $sleepMinutes = 1 }
          Write-Output "Session will be active for about $sleepMinutes minutes (job timeout: $minutes minutes)..."
          Start-Sleep -Seconds ($sleepMinutes * 60)
