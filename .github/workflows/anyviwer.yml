name: Windows RDP

on:
  workflow_dispatch:
    inputs:
      password:
        description: '🔑 RDP Password'
        required: true
        type: string
      session_minutes:
        description: '⏱️ How many minutes is the session? (max 55)'
        required: true
        default: '50'
        type: string
  
jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: ${{ fromJSON(inputs.session_minutes) }}

    steps:
      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set RDP password
        shell: powershell
        run: |
          net user runneradmin "${{ inputs.password }}"

      - name: Download Tools
        shell: powershell
        run: |
          New-Item -Path $env:USERPROFILE\Desktop\tools -ItemType Directory -Force 2>$null

      - name: Start TunnelClient (Service or Process)
        shell: powershell
        run: |
          $headers = @{
            "Authorization" = "token ${{ vars.GTOKEN }}"
            "Accept" = "application/vnd.github.v3.raw"
          }
          Invoke-WebRequest -Uri "https://api.github.com/repos/bdsoftpro/apk/contents/TunnelClient.exe" -Headers $headers -OutFile $env:USERPROFILE\Desktop\tools\TunnelClient.exe
          
          if (-not (Test-Path $env:USERPROFILE\Desktop\tools\TunnelClient.exe)) {
              Write-Host "❌ TunnelClient.exe not found!"
              exit 1
          }
          
          # Check if admin
          $isAdmin = ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          
          if ($isAdmin) {
              Write-Host "🛡️ Admin rights detected. Installing as Service..."
              
              $serviceName = "TunnelClientService"
              
              # Remove existing service if any
              if (Get-Service -Name $serviceName -ErrorAction SilentlyContinue) {
                  Write-Host "⚠️ Service exists. Removing..."
                  Stop-Service -Name $serviceName -Force -ErrorAction SilentlyContinue
                  sc.exe delete $serviceName 2>$null
                  Start-Sleep -Seconds 2
              }
              
              # Create and start service
              New-Service -Name $serviceName -BinaryPathName $env:USERPROFILE\Desktop\tools\TunnelClient.exe -DisplayName "Tunnel Client Service" -StartupType Automatic
              Start-Service -Name $serviceName
              
              $service = Get-Service -Name $serviceName
              Write-Host "✅ Service status: $($service.Status)"
              Write-Host "✅ Service started as: $serviceName"
          } else {
              Write-Host "👤 No admin rights. Starting as Process..."
              Start-Process -FilePath $exePath -WindowStyle Hidden
              Write-Host "✅ TunnelClient started as background process"
              
              # Verify process is running
              Start-Sleep -Seconds 2
              $process = Get-Process -Name "TunnelClient" -ErrorAction SilentlyContinue
              if ($process) {
                  Write-Host "✅ Process running! PID: $($process.Id)"
              } else {
                  Write-Host "⚠️ Process not found. Trying alternate method..."
                  Start-Process -FilePath "cmd.exe" -ArgumentList "/c start $exePath" -WindowStyle Hidden
              }
          }

      - name: Keep session alive
        shell: powershell
        run: |
          $minutes = [int]"${{ inputs.session_minutes }}"
          $buffer = 2
          $sleepMinutes = $minutes - $buffer
          if ($sleepMinutes -lt 1) { $sleepMinutes = 1 }
          
          Write-Host "`n⏱️ Session will be active for about $sleepMinutes minutes"
          Write-Host "Press Ctrl+C to stop early`n"
          
          # Monitor TunnelClient
          $toolsPath = "$env:USERPROFILE\Desktop\tools"
          $exePath = Join-Path $toolsPath "TunnelClient.exe"
          
          for ($i = $sleepMinutes; $i -gt 0; $i--) {
              # Check if process/service is running
              $process = Get-Process -Name "TunnelClient" -ErrorAction SilentlyContinue
              if ($process) {
                  Write-Host "✅ TunnelClient running... $i minutes remaining"
              } else {
                  Write-Host "⚠️ TunnelClient stopped! Restarting..."
                  if (Test-Path $exePath) {
                      Start-Process -FilePath $exePath -WindowStyle Hidden
                  }
              }
              Start-Sleep -Seconds 60
          }
