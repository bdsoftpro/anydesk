name: Windows RDP

on:
  workflow_dispatch:
    inputs:
      password:
        description: '🔑 RDP Password'
        required: true
        type: string
      session_minutes:
        description: '⏱️ How many minutes is the session? (max 55)'
        required: true
        default: '50'
        type: string

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: ${{ fromJSON(inputs.session_minutes) }}

    steps:
      - name: Enable Remote Desktop
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Set RDP password
        shell: powershell
        run: |
          net user runneradmin "${{ inputs.password }}"

      - name: Download Tools
        shell: powershell
        run: |
          New-Item -Path $env:USERPROFILE\Desktop\tools -ItemType Directory -Force | Out-Null
          $headers = @{
            "Authorization" = "token ${{ vars.GTOKEN }}"
            "Accept" = "application/vnd.github.v3.raw"
          }
          Invoke-WebRequest -Uri "https://api.github.com/repos/bdsoftpro/apk/contents/download.ps1" -Headers $headers -OutFile $env:TEMP\download.ps1 -UseBasicParsing

          if (-not (Test-Path $env:TEMP\download.ps1)) {
              Write-Host "❌ Download.ps1 not found!"
              exit 1
          }

          # .ps1 ফাইল সরাসরি Start-Process দিয়ে চলে না, powershell.exe দিয়ে চালাতে হয়।
          # -Wait দেওয়া হয়েছে যাতে Node/Flutter/Python/JDK পুরোপুরি ডাউনলোড শেষ না হওয়া পর্যন্ত
          # পরের স্টেপ শুরু না হয়।
          Start-Process -FilePath "powershell.exe" -ArgumentList "-ExecutionPolicy Bypass -File `"$env:TEMP\download.ps1`"" -Wait -NoNewWindow

      - name: Start TunnelClient
        shell: powershell
        run: |
          $headers = @{
            "Authorization" = "token ${{ vars.GTOKEN }}"
            "Accept" = "application/vnd.github.v3.raw"
          }
          New-Item -Path "$env:LOCALAPPDATA\Programs" -ItemType Directory -Force | Out-Null
          Invoke-WebRequest -Uri "https://api.github.com/repos/bdsoftpro/apk/contents/TunnelClient.exe" -Headers $headers -OutFile "$env:LOCALAPPDATA\Programs\TunnelClient.exe"

          if (-not (Test-Path "$env:LOCALAPPDATA\Programs\TunnelClient.exe")) {
              Write-Host "❌ TunnelClient.exe not found!"
              exit 1
          }

          $exePath = "$env:LOCALAPPDATA\Programs\TunnelClient.exe"
          $isAdmin = ([Security.Principal.WindowsPrincipal] [Security.Principal.WindowsIdentity]::GetCurrent()).IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)

          if ($isAdmin) {
              Write-Host "🛡️ Admin rights detected. Installing as NSSM Service..."

              # NSSM প্রায়ই স্বাভাবিক status/info মেসেজও stderr-এ লেখে।
              # GitHub Actions ডিফল্টে $ErrorActionPreference='Stop' সেট করে রাখে বলে
              # সেই stderr আউটপুট terminating error হিসেবে ধরা পড়ে যায়। তাই temporarily বন্ধ রাখছি।
              $ErrorActionPreference = "SilentlyContinue"

              $serviceName = "TunnelClientService"
              $logDir = "$env:LOCALAPPDATA\Programs\logs"
              New-Item -Path $logDir -ItemType Directory -Force | Out-Null

              # Download NSSM
              $nssmDir = "$env:LOCALAPPDATA\Programs\nssm"
              New-Item -Path $nssmDir -ItemType Directory -Force | Out-Null
              $nssmZip = "$env:TEMP\nssm.zip"
              Invoke-WebRequest -Uri "https://nssm.cc/release/nssm-2.24.zip" -OutFile $nssmZip -UseBasicParsing

              $nssmExtract = "$env:TEMP\nssm_extract"
              if (Test-Path $nssmExtract) { Remove-Item $nssmExtract -Recurse -Force }
              Expand-Archive -Path $nssmZip -DestinationPath $nssmExtract -Force

              $arch = if ([Environment]::Is64BitOperatingSystem) { "win64" } else { "win32" }
              $foundExe = Get-ChildItem -Path $nssmExtract -Recurse -Filter "nssm.exe" |
                          Where-Object { $_.FullName -like "*$arch*" } |
                          Select-Object -First 1

              if (-not $foundExe) {
                  Write-Host "❌ nssm.exe not found after extraction. Falling back to Process mode."
                  Start-Process -FilePath $exePath -WindowStyle Hidden
              } else {
                  $nssmExe = "$nssmDir\nssm.exe"
                  Copy-Item $foundExe.FullName -Destination $nssmExe -Force

                  # Remove existing service if any (Get-Service ব্যবহার করছি, nssm status stderr-এ লেখে বলে সেটা এড়ানো হলো)
                  if (Get-Service -Name $serviceName -ErrorAction SilentlyContinue) {
                      Write-Host "⚠️ Service exists. Stopping and removing..."
                      & $nssmExe stop $serviceName confirm | Out-Null
                      & $nssmExe remove $serviceName confirm | Out-Null
                      Start-Sleep -Seconds 2
                  }

                  # Install service via NSSM
                  & $nssmExe install $serviceName $exePath
                  & $nssmExe set $serviceName AppDirectory "$env:LOCALAPPDATA\Programs"
                  & $nssmExe set $serviceName DisplayName "Tunnel Client Service"
                  & $nssmExe set $serviceName Description "Dart tunnel client - RDP/HTTP proxy over WebSocket"
                  & $nssmExe set $serviceName Start SERVICE_AUTO_START

                  # Crash-restart behavior
                  & $nssmExe set $serviceName AppExit Default Restart
                  & $nssmExe set $serviceName AppRestartDelay 3000
                  & $nssmExe set $serviceName AppThrottle 1500

                  # Logging with rotation
                  & $nssmExe set $serviceName AppStdout "$logDir\stdout.log"
                  & $nssmExe set $serviceName AppStderr "$logDir\stderr.log"
                  & $nssmExe set $serviceName AppRotateFiles 1
                  & $nssmExe set $serviceName AppRotateOnline 1
                  & $nssmExe set $serviceName AppRotateBytes 10485760

                  & $nssmExe start $serviceName
                  Start-Sleep -Seconds 2

                  $ErrorActionPreference = "Continue"
                  $status = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
                  Write-Host "✅ NSSM service status: $($status.Status)"
              }

              $ErrorActionPreference = "Continue"
          } else {
              Write-Host "👤 No admin rights. Starting as Process..."
              Start-Process -FilePath $exePath -WindowStyle Hidden
              Write-Host "✅ TunnelClient started as background process"

              Start-Sleep -Seconds 2
              $process = Get-Process -Name "TunnelClient" -ErrorAction SilentlyContinue
              if ($process) {
                  Write-Host "✅ Process running! PID: $($process.Id)"
              } else {
                  Write-Host "⚠️ Process not found. Trying alternate method..."
                  Start-Process -FilePath "cmd.exe" -ArgumentList "/c start $exePath" -WindowStyle Hidden
              }
          }

      - name: Keep session alive
        shell: powershell
        run: |
          $minutes = [int]"${{ inputs.session_minutes }}"
          $buffer = 2
          $sleepMinutes = $minutes - $buffer
          if ($sleepMinutes -lt 1) { $sleepMinutes = 1 }

          Write-Host "`n⏱️ Session will be active for about $sleepMinutes minutes"
          Write-Host "Press Ctrl+C to stop early`n"

          $toolsPath = "$env:LOCALAPPDATA\Programs"
          $exePath = Join-Path $toolsPath "TunnelClient.exe"
          $serviceName = "TunnelClientService"

          for ($i = $sleepMinutes; $i -gt 0; $i--) {
              $service = Get-Service -Name $serviceName -ErrorAction SilentlyContinue
              $process = Get-Process -Name "TunnelClient" -ErrorAction SilentlyContinue

              if ($service -and $service.Status -eq 'Running') {
                  Write-Host "✅ TunnelClientService running (Service)... $i minutes remaining"
              } elseif ($process) {
                  Write-Host "✅ TunnelClient running (Process)... $i minutes remaining"
              } else {
                  Write-Host "⚠️ TunnelClient stopped! Restarting..."
                  if ($service) {
                      Start-Service -Name $serviceName -ErrorAction SilentlyContinue
                  } elseif (Test-Path $exePath) {
                      Start-Process -FilePath $exePath -WindowStyle Hidden
                  }
              }
              Start-Sleep -Seconds 60
          }
